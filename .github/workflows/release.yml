name: Release

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref_name || github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

jobs:
  check:
    name: Typecheck and Package Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

  publish:
    name: Publish to npm
    needs: check
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package metadata
        id: pkg
        run: |
          echo "name=$(node -e 'process.stdout.write(require("./package.json").name)')" >> "$GITHUB_OUTPUT"
          echo "version=$(node -e 'process.stdout.write(require("./package.json").version)')" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.release.tag_name }}"
          fi
          EXPECTED="v${{ steps.pkg.outputs.version }}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "Tag $TAG does not match package version $EXPECTED"
            exit 1
          fi

      - name: Check if version already exists on npm
        id: npm_check
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.npm_check.outputs.published != 'true'
        run: npm publish --provenance --access public

      - name: Already published
        if: steps.npm_check.outputs.published == 'true'
        run: echo "Version ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} is already published. Skipping."
